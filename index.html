<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados do Mestre - Blackout & Fire (V5 Ultimate Chat & Color)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        /* --- TEMA BLACKOUT --- */
        :root {
            --bg-body: #000000;
            --bg-panel: #050505;
            --border: #1a1a1a;
            --accent: #00ffcc;
            --success: #00ff66;
            --magic: #ffaa00;
            --danger: #ff0000;
            --text-muted: #444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        
        body { 
            background-color: var(--bg-body); 
            color: #fff; 
            min-height: 100vh; 
            padding: 40px 20px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        .app-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1100px; 
        }

        .main-wrapper { flex: 2; }

        /* --- DEVLOG --- */
        .devlog-wrapper {
            flex: 1;
            background-color: var(--bg-panel); 
            border-radius: 12px; 
            padding: 25px;
            border: 1px solid var(--border);
            box-shadow: 0 0 60px rgba(0,0,0,1);
            display: flex;
            flex-direction: column;
            max-height: 855px;
        }

        .devlog-header {
            text-align: center; margin-bottom: 15px; font-size: 14px; color: #333; letter-spacing: 2px; text-transform: uppercase;
        }

        .devlog-content {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px;
        }

        .devlog-content::-webkit-scrollbar { width: 6px; }
        .devlog-content::-webkit-scrollbar-track { background: #000; }
        .devlog-content::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .log-entry {
            background: #0a0a0a; padding: 12px; border-left: 3px solid var(--accent);
            border-radius: 4px; font-size: 13px; color: #ddd; animation: fadeIn 0.3s ease-out; cursor: pointer; transition: 0.2s;
        }
        .log-entry:hover { background: #111; }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        .log-time {
            color: var(--text-muted); font-size: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; pointer-events: none;
        }

        .true-log {
            display: none; color: var(--magic); font-size: 11px; margin-top: 8px; border-top: 1px dashed #331a00; padding-top: 6px; font-weight: bold; animation: fadeIn 0.3s ease-out;
        }
        body.show-true-log .true-log { display: block; }

        .dice-section {
            background-color: var(--bg-panel); border-radius: 12px; padding: 25px; border: 1px solid var(--border); box-shadow: 0 0 60px rgba(0,0,0,1);
        }
        
        .dice-viewport {
            width: 100%; height: 380px; background: #000; border-radius: 8px; position: relative; overflow: hidden; border: 1px solid #111; cursor: crosshair; margin-bottom: 25px; box-shadow: inset 0 0 30px #000;
        }

        .dice-label {
            position: absolute; font-weight: 900; color: #fff; pointer-events: none; text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(0,0,0,1); font-size: 28px; z-index: 100; transform: translate(-50%, -50%);
        }
        
        .crit-text {
            color: #ff0000 !important; font-size: 40px !important; text-shadow: 0 0 20px #ff0000, 0 0 40px #000 !important; animation: pulseCrit 0.5s infinite alternate;
        }
        @keyframes pulseCrit { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.2); } }

        /* Aura visual de GIF no dado */
        .crit-aura {
            position: absolute; pointer-events: none; z-index: 50; width: 280px; transform: translate(-50%, -85%); mix-blend-mode: screen; opacity: 0.95; transition: filter 0.1s;
        }

        .text-blue { color: #00e5ff !important; font-size: 36px !important; text-shadow: 0 0 15px #00e5ff, 0 0 30px #000 !important; }
        .text-green { color: #00ff66 !important; font-size: 36px !important; text-shadow: 0 0 15px #00ff66, 0 0 30px #000 !important; }

        /* --- HUD DE EXIBIÇÃO EM TEMPO REAL --- */
        .hud-overlay {
            position: absolute; bottom: 55px; right: 20px; text-align: right; pointer-events: none; display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
        }
        .hud-item { display: flex; flex-direction: column; align-items: flex-end; }
        .hud-value { font-size: 44px; font-weight: 800; color: rgba(255,255,255,0.1); line-height: 0.9; transition: color 0.3s; }
        .hud-value.active { color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.5); }
        
        .hud-value-small { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.1); line-height: 0.9; transition: color 0.3s; }
        .hud-value-small.active { color: var(--accent); text-shadow: 0 0 10px rgba(0,255,204,0.4); }
        .hud-value-small.active-pct { color: var(--magic); text-shadow: 0 0 10px rgba(255,170,0,0.4); }
        .hud-label { font-size: 9px; color: var(--text-muted); letter-spacing: 1.5px; text-transform: uppercase; }

        .controls-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }

        .dark-input-group { background: #0a0a0a; padding: 12px; border-radius: 6px; border: 1px solid #222; }
        .dark-label { font-size: 10px; font-weight: bold; color: var(--accent); display: block; margin-bottom: 5px; opacity: 0.7; }
        
        .dark-input {
            background: transparent; border: none; border-bottom: 1px solid #333; color: white; width: 100%; text-align: center; font-size: 20px; font-weight: bold; padding: 5px;
        }
        .dark-input:focus { outline: none; border-color: var(--accent); }

        .result-box {
            background: #080808; border: 1px solid #222; border-left: 4px solid var(--success); padding: 15px 25px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;
        }
        .result-title { font-weight: bold; color: var(--success); font-size: 14px; letter-spacing: 1px; }
        .result-number { font-size: 36px; font-weight: bold; color: #fff; text-shadow: 0 0 20px var(--success); }

        .dice-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin-bottom: 20px; }

        .dice-btn { 
            padding: 12px 0; background: #111; border: 1px solid #222; color: #666; font-weight: bold; border-radius: 4px; cursor: pointer; transition: all 0.2s; font-size: 12px; user-select: none;
        }
        
        .btn-coin { border-color: #bdc3c7; color: #bdc3c7; }
        .btn-coin:hover { background: #bdc3c7; color: #000; box-shadow: 0 0 15px #bdc3c7; }
        .btn-d4:hover  { background: #2c3e50; color: #fff; box-shadow: 0 0 10px #2c3e50; border-color: #2c3e50;}
        .btn-d6:hover  { background: #2980b9; color: #fff; box-shadow: 0 0 10px #2980b9; border-color: #2980b9;}
        .btn-d8:hover  { background: #8e44ad; color: #fff; box-shadow: 0 0 10px #8e44ad; border-color: #8e44ad;}
        .btn-d10:hover { background: #d35400; color: #fff; box-shadow: 0 0 10px #d35400; border-color: #d35400;}
        .btn-d12:hover { background: #c0392b; color: #fff; box-shadow: 0 0 10px #c0392b; border-color: #c0392b;}
        .btn-d20 { border-color: #f1c40f; color: #f1c40f; font-weight: 900; }
        .btn-d20:hover { background: #f1c40f; color: #000; box-shadow: 0 0 20px #f1c40f; }
        .btn-d100 { border-color: #bdc3c7; color: #bdc3c7; }
        .btn-d100:hover { background: #bdc3c7; color: #000; box-shadow: 0 0 20px #bdc3c7; }

        .custom-zone {
            display: flex; gap: 10px; background: linear-gradient(90deg, #150800, #000); padding: 5px; border: 1px solid #331a00; border-radius: 8px; position: relative; overflow: hidden; margin-bottom: 10px;
        }
        .custom-zone::before {
            content: ''; position: absolute; top:0; left:0; width: 2px; height: 100%; background: var(--magic); box-shadow: 0 0 15px var(--magic); opacity: 0.6;
        }

        .custom-input-wrapper { position: relative; flex: 1; }
        
        .magic-input {
            width: 100%; background: #000; border: 1px solid #442200; color: var(--magic); padding: 12px 10px 12px 40px; border-radius: 6px; font-size: 16px; font-weight: bold; transition: 0.3s;
        }
        .magic-input:focus { outline: none; border-color: var(--magic); box-shadow: 0 0 15px rgba(255, 170, 0, 0.2); }
        .input-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #666; font-size: 14px; }

        .btn-magic {
            flex: 1; border: none; background: linear-gradient(135deg, #4a2500, #2a1200); color: white; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; transition: all 0.3s; border: 1px solid #663300; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-magic:hover { background: var(--magic); color: #000; box-shadow: 0 0 30px var(--magic); border-color: white; }
        
        .actions-group { display: flex; gap: 10px; margin-top: 15px; }

        .action-btn { 
            flex: 1; padding: 15px; background:#080808; color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; letter-spacing: 2px; font-size: 11px;
        }
        .action-btn:hover { background: var(--accent); color: black; box-shadow: 0 0 30px var(--accent); }

        .btn-dramatizacao { background: #1a0000; color: var(--danger); border-color: var(--danger); }
        .btn-dramatizacao:hover { background: var(--danger); color: white; box-shadow: 0 0 30px var(--danger); }

        .btn-invite { flex: 0.2; background: #001a33; color: var(--accent); border-color: var(--accent); }
        .btn-invite:hover { background: var(--accent); color: black; box-shadow: 0 0 30px var(--accent); }

        .btn-clear { flex: 0.2; background: #2a0000; color: var(--danger); border-color: var(--danger); }
        .btn-clear:hover { background: var(--danger); color: white; box-shadow: 0 0 30px var(--danger); }

        /* --- VIDEO OVERLAY --- */
        #video-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.95); z-index: 9999; align-items: center; justify-content: center;
        }

        #dramatizacao-video {
            max-width: 90%; max-height: 90%; box-shadow: 0 0 50px var(--danger); border: 2px solid var(--danger); border-radius: 8px; cursor: pointer;
        }

        /* --- MODO OBS TRANSMISSÃO (SHARE) --- */
        body.share-mode {
            padding: 0; margin: 0; display: flex; align-items: center; justify-content: center; background-color: #000000; overflow: hidden; height: 100vh; width: 100vw;
        }
        body.share-mode .devlog-wrapper, body.share-mode .controls-row, body.share-mode .result-box, body.share-mode .dice-grid, body.share-mode .custom-zone, body.share-mode .actions-group, body.share-mode h2 { display: none !important; }
        body.share-mode .main-wrapper { display: flex; justify-content: center; align-items: center; width: 100%; height: 100%; }
        body.share-mode .dice-section { padding: 0; border: none; box-shadow: none; background: transparent; width: auto; }
        body.share-mode .dice-viewport { width: 360px; height: 640px; margin: 0; border-radius: 0px; border: none; box-shadow: none; background: #000000; }
        body.share-mode .app-container { max-width: 100%; justify-content: center; }

        /* --- JANELA CMD ESTILO WIN 98 (REGRAS ESC) --- */
        .window-cmd {
            position: absolute; display: none; flex-direction: column; z-index: 9999; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 640px; height: 540px; background: #c0c0c0; border-top: 2px solid #ffffff; border-left: 2px solid #ffffff; border-right: 2px solid #808080; border-bottom: 2px solid #808080; box-shadow: 4px 4px 15px rgba(0,0,0,0.5); font-family: 'Tahoma', sans-serif; color: #000;
        }

        .title-bar-cmd {
            background: #000080; color: white; padding: 3px 5px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 12px; user-select: none;
        }

        .win-btn-cmd {
            background: #c0c0c0; border-top: 1px solid #fff; border-left: 1px solid #fff; border-right: 1px solid #000; border-bottom: 1px solid #000; font-weight: bold; font-size: 10px; width: 16px; height: 14px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: black; box-shadow: inset -1px -1px #808080;
        }
        .win-btn-cmd:active { border: 1px solid #000; border-right: 1px solid #fff; border-bottom: 1px solid #fff; box-shadow: none; }

        .cmd-container-rules {
            background-color: #000; color: #c0c0c0; font-family: 'VT323', 'Courier New', monospace; font-size: 20px; padding: 12px; flex-grow: 1; overflow-y: auto; margin: 2px; border-top: 2px solid #808080; border-left: 2px solid #808080; border-right: 2px solid #ffffff; border-bottom: 2px solid #ffffff; outline: none;
        }
        .cmd-container-rules[contenteditable="true"] { border: 2px solid #00ff00 !important; background: #001100; color: #fff; }

        .cmd-output-rules { white-space: pre-wrap; line-height: 1.1; text-transform: uppercase; }
        .cmd-green { color: #00ff00; } .cmd-yellow { color: #ffff00; } .cmd-blue { color: #00e5ff; } .cmd-red { color: #ff3333; }

        /* --- ÁREA DE CHAT DOS JOGADORES NO TERMINAL (AZUL FRACO) --- */
        .terminal-chat-zone {
            background: rgba(0, 136, 255, 0.15); border: 1px dashed #0088ff; padding: 10px; margin: 10px 0; border-radius: 6px; display: flex; flex-direction: column; gap: 8px; font-family: 'VT323', monospace;
        }
        .terminal-chat-log {
            max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding-right: 5px; font-size: 18px;
        }
        .terminal-chat-log::-webkit-scrollbar { width: 4px; }
        .terminal-chat-log::-webkit-scrollbar-thumb { background: #0088ff; border-radius: 2px; }
        .terminal-chat-input-row { display: flex; align-items: center; gap: 6px; border-top: 1px solid rgba(0, 136, 255, 0.3); padding-top: 6px; }
        .terminal-chat-input {
            background: transparent; border: none; color: #fff; font-family: 'VT323', monospace; font-size: 18px; flex: 1; outline: none;
        }
        .terminal-chat-input::placeholder { color: rgba(255, 255, 255, 0.3); }

        /* --- MENU DE SKINS DE DADOS (SHIFT + ESPAÇO) --- */
        .skin-modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center;
        }
        .skin-panel {
            background: #080a0f; border: 2px solid var(--accent); border-radius: 12px; width: 620px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,255,204,0.2); overflow: hidden; position: relative;
        }
        .skin-header {
            background: #10141d; padding: 15px 20px; border-bottom: 1px solid #1f293d; display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: var(--accent); letter-spacing: 2px; font-size: 14px;
        }
        .skin-body { padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .skin-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        
        .skin-card {
            background: #0e121a; border: 1px solid #222c3e; border-radius: 8px; padding: 12px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 5px; position: relative;
        }
        .skin-card:hover { border-color: var(--accent); background: #141b27; }
        .skin-card.active { border-color: var(--success); box-shadow: 0 0 15px rgba(0,255,102,0.3); background: #112017; }
        .skin-title { font-weight: bold; font-size: 14px; color: #fff; display: flex; align-items: center; justify-content: space-between; }
        .skin-desc { font-size: 11px; color: var(--text-muted); }
        .skin-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; background: #222; color: #aaa; text-transform: uppercase; }
        
        .skin-form { display: none; flex-direction: column; gap: 12px; background: #0c0f17; padding: 15px; border-radius: 8px; border: 1px dashed #2a364f; margin-top: 10px; }
        .form-row { display: flex; gap: 10px; align-items: center; }
        .form-label { font-size: 11px; color: #aaa; flex: 1; }
        .form-input { background: #000; border: 1px solid #333; color: #fff; padding: 6px 10px; border-radius: 4px; flex: 2; font-size: 12px; }
        .form-input[type="color"] { padding: 0; height: 30px; cursor: pointer; }
        .btn-add-skin { background: #1a2333; color: var(--accent); border: 1px solid var(--accent); padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 5px; }
        .btn-add-skin:hover { background: var(--accent); color: #000; }
        .btn-save-custom { background: var(--success); color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 5px; }

        /* Ponto vermelho de teste de coordenada X/Y */
        #testRedDot {
            position: absolute; width: 12px; height: 12px; background: #ff0000; border-radius: 50%;
            box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000; z-index: 100001; pointer-events: none;
            display: none; transform: translate(-50%, -50%); border: 2px solid white;
        }

    </style>
</head>
<body>

<!-- Ponto vermelho de teste de coordenadas de GIF -->
<div id="testRedDot"></div>

<div id="video-overlay">
    <input type="file" id="video-upload" accept="video/*" style="display: none;">
    <video id="dramatizacao-video" src="Kokusen.mp4"></video>
</div>

<audio id="audioClick" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7a0328cdd3.mp3?filename=mouse-click-153941.mp3"></audio>
<audio id="audioErroWin" src="erro.mp3"></audio>
<audio id="audioConfetti1" src="confetti-pop.mp3"></audio>
<audio id="audioConfetti2" src="confetti-pop-sound.mp3"></audio>

<div class="skin-modal" id="skinModal">
    <div class="skin-panel">
        <div class="skin-header">
            <span><i class="fa-solid fa-dice-d20"></i> ARSENAL DE SKINS (INDIVIDUAL)</span>
            <span style="cursor: pointer; color: #ff4444;" onclick="toggleSkinModal()"><i class="fa-solid fa-xmark"></i></span>
        </div>
